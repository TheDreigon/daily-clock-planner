<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Clock Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #e2e8f0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
        }

        .current-time {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .clock-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .clock-controls input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
        }

        .backup-controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .backup-btn {
            padding: 0.75rem 1.5rem;
            background: #475569;
            color: white;
            border: 2px solid #64748b;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .backup-btn:hover {
            background: #334155;
            border-color: #94a3b8;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 2rem;
        }

        .clock-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .form-group input[type="text"],
        .form-group input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 0.5rem;
            font-size: 1rem;
            color: #e2e8f0;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .color-picker {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .color-btn {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            border: 3px solid #334155;
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.active {
            border-color: #f1f5f9;
            transform: scale(1.15);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2563eb;
        }

        .activities-list {
            margin-top: 1.5rem;
        }

        .activity-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            margin-bottom: 0.5rem;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 0.5rem;
            transition: border-color 0.2s;
        }

        .activity-item:hover {
            border-color: #475569;
        }

        .activity-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .activity-color {
            width: 1rem;
            height: 1rem;
            border-radius: 50%;
        }

        .activity-name {
            font-weight: 600;
            color: #f1f5f9;
        }

        .activity-time {
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        .section-title {
            font-size: 1.5rem;
            color: #f1f5f9;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            color: #64748b;
            padding: 2rem;
        }

        .info-text {
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏰ Daily Clock Planner</h1>
            <p class="current-time" id="currentTime"></p>
            <div class="clock-controls">
                <input type="checkbox" id="showPointer" checked onchange="togglePointer()">
                <label for="showPointer">Show current time pointer</label>
            </div>
        </div>

        <div class="backup-controls">
            <button class="backup-btn" onclick="saveBackup()">💾 Save Backup</button>
            <button class="backup-btn" onclick="loadBackup()">📁 Load Backup</button>
        </div>

        <div class="grid">
            <div class="card clock-container">
                <svg id="clock" width="500" height="500" viewBox="0 0 400 400">
                    <circle cx="200" cy="200" r="190" fill="#0f172a" stroke="#334155" stroke-width="2"/>
                    <circle cx="200" cy="200" r="180" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="2,2"/>
                    <g id="hourLines"></g>
                    <g id="activities"></g>
                    <g id="clockNumbers"></g>
                    <g id="currentHand"></g>
                </svg>
            </div>

            <div>
                <div class="card">
                    <h2 class="section-title">➕ Add Activity</h2>
                    
                    <div class="info-text">
                        💡 <strong>Tip:</strong> Use the buttons above to save/load your activities to a file. Keep regular backups to prevent data loss!
                    </div>

                    <div id="errorMessage" style="display: none; background: #991b1b; border: 2px solid #dc2626; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem; color: #fecaca; font-size: 0.9rem;"></div>

                    <div class="form-group">
                        <label for="activityName">Activity Name</label>
                        <input type="text" id="activityName" placeholder="e.g., Gym, Meeting, Study...">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="startHour">Start Time</label>
                            <input type="number" id="startHour" min="0" max="23" value="9">
                        </div>
                        <div class="form-group">
                            <label for="endHour">End Time</label>
                            <input type="number" id="endHour" min="0" max="24" value="10">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Color</label>
                        <div class="color-picker" id="colorPicker"></div>
                    </div>

                    <button class="btn" onclick="addActivity()">Add Activity</button>
                </div>

                <div class="card" style="margin-top: 1.5rem;">
                    <h2 class="section-title">📋 Today's Activities</h2>
                    <div id="activitiesList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        const colors = [
            { value: '#3b82f6', name: 'Blue' },
            { value: '#10b981', name: 'Green' },
            { value: '#f59e0b', name: 'Orange' },
            { value: '#8b5cf6', name: 'Purple' },
            { value: '#ec4899', name: 'Pink' },
            { value: '#ef4444', name: 'Red' },
            { value: '#06b6d4', name: 'Cyan' },
            { value: '#84cc16', name: 'Lime' },
            { value: '#f97316', name: 'Deep Orange' },
            { value: '#a855f7', name: 'Violet' }
        ];

        let activities = [];

        let selectedColor = '#3b82f6';
        let showPointer = true;

        function togglePointer() {
            showPointer = document.getElementById('showPointer').checked;
            updateClock();
        }

        async function saveBackup() {
            const dataStr = JSON.stringify(activities, null, 2);
            const result = await ipcRenderer.invoke('save-file', dataStr);
            if (result) {
                showError('✓ Activities saved successfully!', true);
            }
        }

        async function loadBackup() {
            const data = await ipcRenderer.invoke('load-file');
            if (data) {
                try {
                    const imported = JSON.parse(data);
                    if (Array.isArray(imported)) {
                        activities = imported;
                        saveActivities();
                        updateActivitiesList();
                        updateClock();
                        showError('✓ Activities loaded successfully!', true);
                    } else {
                        showError('Invalid file!');
                    }
                } catch (error) {
                    showError('Error reading file!');
                }
            }
        }

        function initColorPicker() {
            const picker = document.getElementById('colorPicker');
            colors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.backgroundColor = color.value;
                btn.setAttribute('data-color', color.value);
                btn.title = color.name;
                btn.onclick = () => selectColor(color.value);
                if (color.value === selectedColor) {
                    btn.classList.add('active');
                }
                picker.appendChild(btn);
            });
        }

        function selectColor(color) {
            selectedColor = color;
            
            // Remove active class from all buttons
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Add active class to clicked button
            document.querySelectorAll('.color-btn').forEach(btn => {
                if (btn.getAttribute('data-color') === color) {
                    btn.classList.add('active');
                }
            });
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').textContent = 
                `Current time: ${now.toLocaleTimeString('en-US')}`;

            drawHourLines();
            drawClockNumbers();
            drawActivities();
            drawCurrentHand(now);
        }

        function drawHourLines() {
            const svg = document.getElementById('hourLines');
            svg.innerHTML = '';
            
            for (let i = 0; i < 24; i++) {
                const angle = (i * 15) - 90;
                const startX = 200 + 10 * Math.cos(angle * Math.PI / 180);
                const startY = 200 + 10 * Math.sin(angle * Math.PI / 180);
                const endX = 200 + 175 * Math.cos(angle * Math.PI / 180);
                const endY = 200 + 175 * Math.sin(angle * Math.PI / 180);
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', startX);
                line.setAttribute('y1', startY);
                line.setAttribute('x2', endX);
                line.setAttribute('y2', endY);
                line.setAttribute('stroke', '#475569');
                line.setAttribute('stroke-width', '1');
                line.setAttribute('opacity', '0.5');
                svg.appendChild(line);
            }
        }

        function drawClockNumbers() {
            const svg = document.getElementById('clockNumbers');
            svg.innerHTML = '';
            
            for (let i = 0; i < 24; i++) {
                const angle = (i * 15) - 90;
                const x = 200 + 160 * Math.cos(angle * Math.PI / 180);
                const y = 200 + 160 * Math.sin(angle * Math.PI / 180);
                
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', x);
                text.setAttribute('y', y);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.setAttribute('fill', '#94a3b8');
                text.setAttribute('font-size', '12');
                text.setAttribute('font-weight', '600');
                text.textContent = i;
                svg.appendChild(text);
            }
        }

        function drawActivities() {
            const svg = document.getElementById('activities');
            svg.innerHTML = '';

            activities.forEach(activity => {
                const startAngle = (activity.startHour * 15) - 90;
                const endAngle = (activity.endHour * 15) - 90;
                
                const startX = 200 + 140 * Math.cos(startAngle * Math.PI / 180);
                const startY = 200 + 140 * Math.sin(startAngle * Math.PI / 180);
                const endX = 200 + 140 * Math.cos(endAngle * Math.PI / 180);
                const endY = 200 + 140 * Math.sin(endAngle * Math.PI / 180);
                
                const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
                
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M 200 200 L ${startX} ${startY} A 140 140 0 ${largeArc} 1 ${endX} ${endY} Z`);
                path.setAttribute('fill', activity.color);
                path.setAttribute('opacity', '0.4');
                path.setAttribute('stroke', activity.color);
                path.setAttribute('stroke-width', '2');
                svg.appendChild(path);
            });
        }

        function drawCurrentHand(time) {
            const svg = document.getElementById('currentHand');
            svg.innerHTML = '';

            if (!showPointer) {
                return;
            }

            const hours = time.getHours() + time.getMinutes() / 60;
            const angle = (hours * 15) - 90;
            const x = 200 + 120 * Math.cos(angle * Math.PI / 180);
            const y = 200 + 120 * Math.sin(angle * Math.PI / 180);

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', '200');
            line.setAttribute('y1', '200');
            line.setAttribute('x2', x);
            line.setAttribute('y2', y);
            line.setAttribute('stroke', '#ef4444');
            line.setAttribute('stroke-width', '3');
            line.setAttribute('stroke-linecap', 'round');
            svg.appendChild(line);

            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', '200');
            circle.setAttribute('cy', '200');
            circle.setAttribute('r', '6');
            circle.setAttribute('fill', '#ef4444');
            svg.appendChild(circle);
        }

        function showError(message, isSuccess = false) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            
            if (isSuccess) {
                errorDiv.style.background = '#065f46';
                errorDiv.style.borderColor = '#10b981';
            } else {
                errorDiv.style.background = '#991b1b';
                errorDiv.style.borderColor = '#dc2626';
            }
            
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function addActivity() {
            const nameInput = document.getElementById('activityName');
            const name = nameInput.value.trim();
            const startHour = parseInt(document.getElementById('startHour').value);
            const endHour = parseInt(document.getElementById('endHour').value);

            if (!name) {
                showError('Please enter an activity name!');
                nameInput.focus();
                return;
            }

            if (startHour >= endHour) {
                showError('End time must be greater than start time!');
                return;
            }

            activities.push({
                id: Date.now(),
                name,
                startHour,
                endHour,
                color: selectedColor
            });

            nameInput.value = '';
            nameInput.focus();
            saveActivities();
            updateActivitiesList();
            updateClock();
        }

        function removeActivity(id) {
            activities = activities.filter(a => a.id !== id);
            saveActivities();
            updateActivitiesList();
            updateClock();
        }

        function updateActivitiesList() {
            const list = document.getElementById('activitiesList');
            
            if (activities.length === 0) {
                list.innerHTML = '<div class="empty-state">No activities added</div>';
                return;
            }

            list.innerHTML = activities.map(activity => `
                <div class="activity-item">
                    <div class="activity-info">
                        <div class="activity-color" style="background-color: ${activity.color}"></div>
                        <div>
                            <div class="activity-name">${activity.name}</div>
                            <div class="activity-time">${activity.startHour}:00 - ${activity.endHour}:00</div>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="removeActivity(${activity.id})">Delete</button>
                </div>
            `).join('');
        }

        function saveActivities() {
            localStorage.setItem('activities', JSON.stringify(activities));
        }

        function loadActivities() {
            const saved = localStorage.getItem('activities');
            if (saved) {
                activities = JSON.parse(saved);
            }
        }

        // Initialize
        loadActivities();
        initColorPicker();
        updateActivitiesList();
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
